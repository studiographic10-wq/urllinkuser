<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #555;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Locked to exact A4 dimensions */
        .receipt-container {
            width: 210mm;
            min-height: 297mm;
            background: white;
            border: 1px solid #ccc;
            padding: 15mm 20mm;
            box-sizing: border-box;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            /* Needed for absolute positioning of watermark */
            overflow: hidden;
            /* Prevents watermark from spilling out */
        }

        /* Watermark Styling */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            /* Centered and slightly tilted */
            width: 70%;
            /* Make it large */
            opacity: 0.08;
            /* Very faint */
            z-index: 0;
            /* Sits behind the text */
            pointer-events: none;
            /* Prevents it from blocking clicks on inputs */
        }

        /* Ensure form content sits above the watermark */
        .content-wrapper {
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header h2,
        .header h3 {
            margin: 5px 0;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            align-items: center;
        }

        .row input {
            border: none;
            border-bottom: 1px dashed #666;
            outline: none;
            width: 70%;
            font-size: 15px;
            padding: 4px 5px;
            font-family: inherit;
            background: transparent;
            /* Important for watermark to show through */
        }

        .row label {
            font-weight: bold;
            width: 25%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            margin-bottom: 20px;
        }

        th,
        td {
            border: 1px solid #333;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: rgba(233, 236, 239, 0.8);
            /* Slightly transparent header */
        }

        td input[type="text"],
        td input[type="number"] {
            width: 95%;
            border: none;
            outline: none;
            font-size: 15px;
            background: transparent;
            font-family: inherit;
        }

        .totals-section {
            width: 50%;
            float: right;
            margin-top: 20px;
        }

        .totals-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .totals-row input {
            text-align: right;
            font-weight: bold;
            width: 120px;
            border: none;
            border-bottom: 1px solid #000;
            outline: none;
            font-family: inherit;
            background: transparent;
        }

        .totals-row.highlight {
            font-weight: bold;
            color: #d9534f;
        }

        .signatures {
            margin-top: 100px;
            display: flex;
            justify-content: space-between;
            clear: both;
        }

        /* Button Styling */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 25px;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .btn-print {
            background-color: #0056b3;
        }

        .btn-print:hover {
            background-color: #004494;
        }

        .btn-pdf {
            background-color: #28a745;
        }

        .btn-pdf:hover {
            background-color: #218838;
        }

        /* Print formatting */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }

            .receipt-container {
                border: none;
                box-shadow: none;
                padding: 0;
                margin: 0;
                width: 100%;
                min-height: auto;
            }

            .action-buttons {
                display: none;
            }

            input {
                border-bottom: 1px solid #000 !important;
            }

            /* Ensure watermark prints */
            .watermark {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }
    </style>
</head>

<body>

    <div class="action-buttons">
        <button class="btn btn-print" onclick="window.print()">Print Receipt</button>
        <button class="btn btn-pdf" onclick="generatePDF()">Save as PDF</button>
    </div>

    <div class="receipt-container" id="receipt-content">

        <img src="file:///C:/Users/Windows%2011/Desktop/New%20folder%20(4)/digital-india-watermark.png" alt="Digital India Watermark" class="watermark">

        <div class="content-wrapper">
            <div class="header" style="position: relative;">
                <svg id="barcode" style="transform: translate(0,0)" width="300px" height="42px" x="0px" y="0px" viewBox="0 0 300 42" xmlns="http://www.w3.org/2000/svg" version="1.1"><rect x="0" y="0" width="300" height="42" style="fill:#ffffff;"></rect><g transform="translate(0, 0)" style="fill:#000;"><rect x="0" y="0" width="3" height="30"></rect><rect x="4.5" y="0" width="1.5" height="30"></rect><rect x="9" y="0" width="1.5" height="30"></rect><rect x="16.5" y="0" width="1.5" height="30"></rect><rect x="19.5" y="0" width="4.5" height="30"></rect><rect x="28.5" y="0" width="3" height="30"></rect><rect x="33" y="0" width="1.5" height="30"></rect><rect x="39" y="0" width="4.5" height="30"></rect><rect x="45" y="0" width="3" height="30"></rect><rect x="49.5" y="0" width="1.5" height="30"></rect><rect x="54" y="0" width="3" height="30"></rect><rect x="58.5" y="0" width="4.5" height="30"></rect><rect x="66" y="0" width="3" height="30"></rect><rect x="73.5" y="0" width="1.5" height="30"></rect><rect x="79.5" y="0" width="1.5" height="30"></rect><rect x="82.5" y="0" width="1.5" height="30"></rect><rect x="85.5" y="0" width="3" height="30"></rect><rect x="93" y="0" width="1.5" height="30"></rect><rect x="99" y="0" width="3" height="30"></rect><rect x="103.5" y="0" width="3" height="30"></rect><rect x="109.5" y="0" width="3" height="30"></rect><rect x="115.5" y="0" width="1.5" height="30"></rect><rect x="120" y="0" width="3" height="30"></rect><rect x="124.5" y="0" width="4.5" height="30"></rect><rect x="132" y="0" width="3" height="30"></rect><rect x="136.5" y="0" width="3" height="30"></rect><rect x="142.5" y="0" width="3" height="30"></rect><rect x="148.5" y="0" width="3" height="30"></rect><rect x="156" y="0" width="1.5" height="30"></rect><rect x="159" y="0" width="4.5" height="30"></rect><rect x="165" y="0" width="1.5" height="30"></rect><rect x="171" y="0" width="3" height="30"></rect><rect x="175.5" y="0" width="1.5" height="30"></rect><rect x="181.5" y="0" width="1.5" height="30"></rect><rect x="187.5" y="0" width="1.5" height="30"></rect><rect x="193.5" y="0" width="3" height="30"></rect><rect x="198" y="0" width="1.5" height="30"></rect><rect x="202.5" y="0" width="3" height="30"></rect><rect x="207" y="0" width="4.5" height="30"></rect><rect x="214.5" y="0" width="1.5" height="30"></rect><rect x="217.5" y="0" width="4.5" height="30"></rect><rect x="223.5" y="0" width="6" height="30"></rect><rect x="231" y="0" width="3" height="30"></rect><rect x="237" y="0" width="1.5" height="30"></rect><rect x="243" y="0" width="1.5" height="30"></rect><rect x="247.5" y="0" width="1.5" height="30"></rect><rect x="250.5" y="0" width="4.5" height="30"></rect><rect x="258" y="0" width="3" height="30"></rect><rect x="264" y="0" width="4.5" height="30"></rect><rect x="270" y="0" width="3" height="30"></rect><rect x="274.5" y="0" width="4.5" height="30"></rect><rect x="280.5" y="0" width="3" height="30"></rect><rect x="288" y="0" width="4.5" height="30"></rect><rect x="294" y="0" width="1.5" height="30"></rect><rect x="297" y="0" width="3" height="30"></rect><text style="font: 10px monospace" text-anchor="middle" x="150" y="42">NO-ID - REC-1015</text></g></svg>
                <h2>COMMON SERVICE CENTRE (CSC) - DIGITAL INDIA</h2>
                <h3>CASH MEMO / RECEIPT</h3>
            </div>

            <div class="row"><label>Center Name:</label> <input type="text" placeholder="Enter Center Name"></div>
            <div class="row"><label>VLE Name:</label> <input type="text" placeholder="Enter VLE Name"></div>
            <div class="row"><label>CSC ID:</label> <input type="text" id="csc-id" placeholder="Enter CSC ID" onchange="updateBarcode()"></div>

            <hr style="margin: 25px 0;">

            <div class="row" style="justify-content: flex-start; gap: 20px;">
                <label style="width: auto;">Receipt No:</label>
                <input type="text" id="receipt-no" style="width: 120px; font-weight: bold; color: #d9534f;">

                <label style="width: auto; margin-left: auto;">Date:</label>
                <input type="date" id="receipt-date" style="width: 140px;">
            </div>

            <div class="row"><label>Customer Name:</label> <input type="text"></div>
            <div class="row"><label>Mobile No:</label> <input type="text"></div>
            <div class="row"><label>Address / Village:</label> <input type="text"></div>

            <table>
                <tbody><tr>
                    <th style="width: 10%; text-align: center;">S.No.</th>
                    <th style="width: 65%;">Description of Service / Particulars</th>
                    <th style="width: 25%; text-align: right;">Amount (₹)</th>
                </tr>
                <tr>
                    <td style="text-align: center;">1</td>
                    <td><input type="text"></td>
                    <td style="text-align: right;"><input type="number" class="amount" oninput="calculateTotal()" min="0"></td>
                </tr>
                <tr>
                    <td style="text-align: center;">2</td>
                    <td><input type="text"></td>
                    <td style="text-align: right;"><input type="number" class="amount" oninput="calculateTotal()" min="0"></td>
                </tr>
                <tr>
                    <td style="text-align: center;">3</td>
                    <td><input type="text"></td>
                    <td style="text-align: right;"><input type="number" class="amount" oninput="calculateTotal()" min="0"></td>
                </tr>
                <tr>
                    <td style="text-align: center;">4</td>
                    <td><input type="text"></td>
                    <td style="text-align: right;"><input type="number" class="amount" oninput="calculateTotal()" min="0"></td>
                </tr>
                <tr>
                    <td style="text-align: center;">5</td>
                    <td><input type="text"></td>
                    <td style="text-align: right;"><input type="number" class="amount" oninput="calculateTotal()" min="0"></td>
                </tr>
            </tbody></table>

            <div class="totals-section">
                <div class="totals-row">
                    <span>Total Amount: ₹</span>
                    <input type="number" id="total" readonly="" placeholder="0.00">
                </div>
                <div class="totals-row">
                    <span>Advance Paid: ₹</span>
                    <input type="number" id="advance" oninput="calculateTotal()" min="0" placeholder="0.00">
                </div>
                <div class="totals-row highlight">
                    <span>Balance Due: ₹</span>
                    <input type="number" id="balance" readonly="" placeholder="0.00">
                </div>
            </div>

            <div class="signatures">
                <div style="text-align: center;">
                    <br>_______________________<br>
                    <strong>Customer Signature</strong>
                </div>
                <div style="text-align: center;">
                    <br>_______________________<br>
                    <strong>VLE Signature &amp; Seal</strong>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onload = function () {
            // Auto-fill Today's Date
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            document.getElementById('receipt-date').value = `${year}-${month}-${day}`;

            // Auto-generate Receipt Number
            let currentRecNo = localStorage.getItem("csc_receipt_no");
            if (!currentRecNo) {
                currentRecNo = 1001;
            } else {
                currentRecNo = parseInt(currentRecNo) + 1;
            }
            localStorage.setItem("csc_receipt_no", currentRecNo);
            document.getElementById('receipt-no').value = "REC-" + currentRecNo;

            updateBarcode();
        };

        function updateBarcode() {
            const cscId = document.getElementById('csc-id').value || "NO-ID";
            const recNo = document.getElementById('receipt-no').value;
            const barcodeData = cscId + " - " + recNo;

            JsBarcode("#barcode", barcodeData, {
                format: "CODE128",
                lineColor: "#000",
                width: 1.5,
                height: 30,
                displayValue: true,
                fontSize: 10,
                margin: 0
            });
        }

        function calculateTotal() {
            let amounts = document.querySelectorAll('.amount');
            let total = 0;

            amounts.forEach(input => {
                let val = parseFloat(input.value);
                if (!isNaN(val)) { total += val; }
            });

            document.getElementById('total').value = total.toFixed(2);

            let advance = parseFloat(document.getElementById('advance').value);
            if (isNaN(advance)) { advance = 0; }

            let balance = total - advance;
            if (balance < 0) balance = 0;

            document.getElementById('balance').value = balance.toFixed(2);
        }

        function generatePDF() {
            const element = document.getElementById('receipt-content');
            const recNo = document.getElementById('receipt-no').value;

            const opt = {
                margin: 0,
                filename: `CSC_Cash_Memo_${recNo}.pdf`,
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, useCORS: true, allowTaint: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save();
        }
    </script>



</body></html>
